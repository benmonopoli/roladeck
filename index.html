<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RolaDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/frontend/public/style.css" />
</head>
<body>
  <!-- SVG filter for pencil texture on Was Here tags -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden">
    <defs>
      <filter id="pencil-stroke" x="-5%" y="-5%" width="115%" height="115%">
        <feTurbulence type="fractalNoise" baseFrequency="0.035 0.065" numOctaves="4" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feComposite in="displaced" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>
  <div id="root"></div>
  <script type="module" src="/frontend/Index.re"></script>
</body>
</html>
